name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  design_cli_nightly:
    name: DBM Nightly Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: design_cli nightly gate
        run: bash scripts/run_dbm_test_suite.sh nightly

      - name: experimental tests
        run: bash scripts/run_ci_test_suite.sh experiments

      - name: install cargo-audit
        run: cargo install cargo-audit --locked

      - name: security audit
        run: cargo audit
