name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --locked

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: secret scan
        uses: gitleaks/gitleaks-action@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install ruff
        run: pip install ruff

      - name: python lint
        run: ruff check .

  tier1_unit:
    name: Tier1 Unit Correctness
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: boundary rules
        run: |
          cargo tree --workspace > tree.txt
          cargo tree -p chm | tee /tmp/chm_tree.txt
          if rg -q " shm v" /tmp/chm_tree.txt; then
            echo "Dependency leak: chm must not depend on shm"
            exit 1
          fi
          if rg -n "Shm::new|Chm::new" crates/agent_core; then
            echo "Boundary violation detected"
            exit 1
          fi
          if rg -n "use (shm|chm|dhm)::" crates/agent_core/src crates/agent_core/tests; then
            echo "Dependency leak: agent_core must access layers only via hybrid_vm"
            exit 1
          fi
          if rg -n "use language_dhm::|LanguageDhm::" crates/agent_core/src crates/agent_core/tests; then
            echo "Boundary violation: agent_core must not use language_dhm directly"
            exit 1
          fi
          if rg -n "use semantic_dhm::|SemanticDhm::" crates/agent_core/src crates/agent_core/tests; then
            echo "Boundary violation: agent_core must not use semantic_dhm directly"
            exit 1
          fi
          if rg -n "use language_dhm::|use shm::|use chm::|use meaning_extractor::" crates/recomposer/src; then
            echo "Boundary violation: recomposer must depend only on semantic_dhm"
            exit 1
          fi
          if rg -n "use (semantic_dhm|recomposer|language_dhm)::" apps/cli/src apps/cli/tests; then
            echo "Boundary violation: CLI must depend only on hybrid_vm"
            exit 1
          fi

      - name: memory_space unit
        run: cargo test -p memory_space --lib --locked

      - name: reasoning_agent unit
        run: cargo test -p reasoning_agent --lib --locked

      - name: hybrid_vm unit
        run: cargo test -p hybrid_vm --lib --locked

      - name: semantic_dhm unit
        run: cargo test -p semantic_dhm --lib --locked

      - name: recomposer unit
        run: cargo test -p recomposer --lib --locked

      - name: agent_core unit
        run: cargo test -p agent_core --lib --locked

  tier2_math:
    name: Tier2 Mathematical Property
    needs: [tier1_unit]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: memory_space property tests
        run: cargo test -p memory_space --lib proptest_props --locked

      - name: field_engine property tests
        run: cargo test -p field_engine --lib proptest_props --locked

      - name: recomposer property tests
        run: cargo test -p recomposer --lib proptest_props --locked

      - name: pareto property tests
        run: cargo test -p agent_core --test contract hypervolume_monotonicity --locked

      - name: hypervolume monotonicity
        run: cargo test -p agent_core --test engine pareto --locked

  tier3_integration:
    name: Tier3 Integration
    needs: [tier2_math]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: reasoning pipeline integration
        run: cargo test -p reasoning_agent --test integration --locked

      - name: cli integration
        run: cargo test -p design_cli --test integration --locked

      - name: failure injection recall override
        run: cargo test -p reasoning_agent --test recall_override --locked

      - name: failure injection false resonance
        run: cargo test -p reasoning_agent --test false_resonance --locked

      - name: simulation stability
        run: cargo test -p reasoning_agent --test simulation_stability --locked

  tier4_stress:
    name: Tier4 Stress Scaling
    needs: [tier3_integration]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: scaling stress tests
        run: cargo test -p reasoning_agent --test scaling --release --locked

      - name: deep trace stability
        run: cargo test -p agent_core --test heavy --release --features ci-heavy --locked

  tier5_determinism:
    name: Tier5 Determinism Scientific
    needs: [tier4_stress]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: deterministic suite
        run: cargo test -p reasoning_agent --test deterministic --locked -- --test-threads=1

      - name: deterministic evaluation
        run: cargo test -p reasoning_agent --test evaluation_determinism --locked -- --test-threads=1

      - name: deterministic contract
        run: cargo test -p agent_core --test contract deterministic_engine_fast_10_seeds_3_runs_hash_and_hv_equal --locked -- --test-threads=1

      - name: deterministic memory ranking
        run: cargo test -p memory_space_index search_is_deterministic --locked -- --test-threads=1
