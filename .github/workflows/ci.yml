name: CI

on:
  push:
  pull_request:

jobs:
  rust-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy (strict)
        run: cargo clippy --all-targets -- -D warnings

      - name: Phase1 fast suite
        run: |
          cargo test -p agent_core
          cargo test -p design_gui
          cargo test -p design_cli

      - name: Heavy suite (CI only)
        run: cargo test --all-features -p agent_core -p design_cli
