name: DBM CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace --verbose

  test:
    name: Unit & Integration Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features --verbose

  determinism:
    name: Determinism Check
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        case: [noop, composite, mutation]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      
      - name: Determinism (No-op)
        if: matrix.case == 'noop'
        run: |
          cargo run -p design_cli --bin verify_cli -- \
            determinism \
            --input " @apps/cli/tests/integration/repl_file_target_routing.rs src/sample.rs を安全に改善して preview" \
            --runs 5 \
            --strict

      - name: Determinism (Composite)
        if: matrix.case == 'composite'
        run: |
          cargo run -p design_cli --bin verify_cli -- \
            determinism \
            --input "src/sample.rs を解析して修正して" \
            --runs 5 \
            --strict

      - name: Determinism (Mutation)
        if: matrix.case == 'mutation'
        run: |
          cargo run -p design_cli --bin verify_cli -- \
            determinism \
            --input " @apps/cli/tests/integration/repl_file_target_routing.rs src/sample.rs にログを追加して preview" \
            --runs 5 \
            --strict

  regression:
    name: Regression Guard (Contract)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run contract tests
        run: cargo test -p design_cli --test contract
