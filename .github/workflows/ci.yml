name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --locked

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: secret scan
        uses: gitleaks/gitleaks-action@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install ruff
        run: pip install ruff

      - name: python lint
        run: ruff check .

  legacy_isolation:
    name: Legacy Codegen Isolation
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: dependency isolation — codegen_core_old must not appear in default build
        run: |
          # codegen_core_old is optional; cargo tree must NOT show it as active
          # without the legacy_codegen feature.
          if cargo tree -p code_language_core --locked 2>/dev/null | grep -q "codegen_core_old"; then
            echo "FAIL: codegen_core_old is active in the default build of code_language_core"
            echo "It must only appear when --features legacy_codegen is passed."
            exit 1
          fi
          echo "OK: codegen_core_old is not active in the default build."

      - name: source isolation — no direct codegen_core_old references outside authorized paths
        run: |
          # Only crates/legacy/codegen_core_old and crates/code_language_core are
          # authorized to reference codegen_core_old. All other crates must not.
          if grep -r "codegen_core_old" crates/ \
               --include="*.rs" \
               --exclude-dir="codegen_core_old" \
               --exclude-dir="code_language_core"; then
            echo "FAIL: Direct reference to codegen_core_old found outside authorized paths."
            exit 1
          fi
          echo "OK: No unauthorized codegen_core_old references in source."

      - name: workspace tree check — full dependency scan
        run: |
          cargo tree --workspace --locked > /tmp/workspace_tree.txt
          # Verify codegen_core_old only appears as an optional dep of code_language_core
          if grep "codegen_core_old" /tmp/workspace_tree.txt | grep -v "(optional)"; then
            echo "FAIL: codegen_core_old appears as an active (non-optional) dependency."
            exit 1
          fi
          echo "OK: codegen_core_old is strictly optional."

      - name: legacy verification — feature path compiles and tests pass
        run: |
          cargo test -p code_language_core --features legacy_codegen --locked
          echo "OK: legacy_codegen feature path is valid."

  tier1_unit:
    name: Tier1 Invariants And Engines
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: boundary rules
        run: |
          cargo tree --workspace > tree.txt
          cargo tree -p chm | tee /tmp/chm_tree.txt
          if rg -q " shm v" /tmp/chm_tree.txt; then
            echo "Dependency leak: chm must not depend on shm"
            exit 1
          fi
          if rg -n "Shm::new|Chm::new" crates/agent_core; then
            echo "Boundary violation detected"
            exit 1
          fi
          if rg -n "use (shm|chm|dhm)::" crates/agent_core/src crates/agent_core/tests; then
            echo "Dependency leak: agent_core must access layers only via hybrid_vm"
            exit 1
          fi
          if rg -n "use language_dhm::|LanguageDhm::" crates/agent_core/src crates/agent_core/tests; then
            echo "Boundary violation: agent_core must not use language_dhm directly"
            exit 1
          fi
          if rg -n "use semantic_dhm::|SemanticDhm::" crates/agent_core/src crates/agent_core/tests; then
            echo "Boundary violation: agent_core must not use semantic_dhm directly"
            exit 1
          fi
          if rg -n "use language_dhm::|use shm::|use chm::|use meaning_extractor::" crates/recomposer/src; then
            echo "Boundary violation: recomposer must depend only on semantic_dhm"
            exit 1
          fi
          if rg -n "use (semantic_dhm|recomposer|language_dhm)::" apps/cli/src apps/cli/tests; then
            echo "Boundary violation: CLI must depend only on hybrid_vm"
            exit 1
          fi
          if rg -rn "codegen_core_old" crates/runtime crates/code_ir crates/architecture_reasoner 2>/dev/null; then
            echo "Boundary violation: codegen_core_old must not be referenced from runtime or core IR crates"
            exit 1
          fi

      - name: invariants suite
        run: bash scripts/run_ci_test_suite.sh invariants

      - name: engine suite
        run: bash scripts/run_ci_test_suite.sh engine

      - name: knowledge engine suite
        run: bash scripts/run_ci_test_suite.sh knowledge_engine

  tier2_math:
    name: Tier2 Mathematical Property
    needs: [tier1_unit]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: memory_space property tests
        run: cargo test -p memory_space --lib proptest_props --locked

      - name: field_engine property tests
        run: cargo test -p field_engine --lib proptest_props --locked

      - name: recomposer property tests
        run: cargo test -p recomposer --lib proptest_props --locked

      - name: pareto property tests
        run: cargo test -p agent_core --test contract hypervolume_monotonicity --locked

      - name: hypervolume monotonicity
        run: cargo test -p agent_core --test engine pareto --locked

  tier3_integration:
    name: Tier3 Integration
    needs: [tier2_math]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: integration suite
        run: bash scripts/run_ci_test_suite.sh integration

  tier4_stress:
    name: Tier4 Stress Scaling
    needs: [tier3_integration]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: scaling stress tests
        run: cargo test -p reasoning_agent --test scaling --release --locked

      - name: deep trace stability
        run: cargo test -p agent_core --test heavy --release --features ci-heavy --locked

  tier5_determinism:
    name: Tier5 Determinism
    needs: [tier4_stress]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: determinism suite
        run: bash scripts/run_ci_test_suite.sh determinism
