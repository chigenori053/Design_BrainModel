name: Bench

on:
  schedule:
    - cron: "0 3 * * 0"  # 毎週日曜 03:00 UTC
  workflow_dispatch:

jobs:
  bench:
    name: Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master

      - uses: Swatinem/rust-cache@v2

      - name: bench
        run: cargo bench --workspace
