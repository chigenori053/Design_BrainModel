name: Architecture

on:
  push:
    paths:
      - ".github/workflows/architecture.yml"
      - "apps/cli/**"
      - "tools/check_analyze_result.py"
  pull_request:
    paths:
      - ".github/workflows/architecture.yml"
      - "apps/cli/**"
      - "tools/check_analyze_result.py"

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p design_cli --test architecture_enforcement -- --test-threads=1
      - run: cargo test -p design_cli --test negative_cases -- --test-threads=1
      - run: cargo test -p design_cli --test reasoning_engine -- --test-threads=1
      - run: cargo run -p design_cli --bin cli -- analyze apps/cli/tests/fixtures/architecture_clean --json > result.json
      - run: python3 tools/check_analyze_result.py result.json
